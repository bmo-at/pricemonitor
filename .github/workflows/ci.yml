name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Vet, Lint & Test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Test
        run: go test ./... -race -count=1

  build-and-push:
    name: Build & Push Image
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: ko-build/setup-ko@v0.9

      - name: Log in to GHCR
        run: ko login ghcr.io -u ${{ github.actor }} --password-stdin <<< "${{ secrets.GITHUB_TOKEN }}"

      - name: Build and push
        run: ko build --bare --tags latest,${{ github.sha }}
        env:
          KO_DOCKER_REPO: ghcr.io/${{ github.repository }}
          KO_DEFAULT_BASE_IMAGE: alpine
