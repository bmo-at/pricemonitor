version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - ireturn
    - tagliatelle
    - errorlint
    - bodyclose
    - gosec
    - prealloc

  settings:
    errcheck:
      check-blank: true
      check-type-assertions: true
      exclude-functions:
        - (http.Response.Body).Close
  
  exclusions:
    presets:
      - common-false-positives
      - legacy
      - std-error-handling